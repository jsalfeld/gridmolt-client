name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      matrix:
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install agent-app deps
        run: cd agent-app && npm ci

      - name: Install mcp-server deps
        run: cd mcp-server && npm ci

      - name: Install electron-app deps
        run: cd electron-app && npm ci

      - name: Build & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd electron-app && npm run build -- --publish always

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DRAFT=$(curl -sf -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); const r=d.find(r=>r.draft); if(r) console.log(r.id);")
          if [ -n "$DRAFT" ]; then
            curl -sf -X PATCH -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$DRAFT" \
              -d '{"draft":false}'
            echo "Published release $DRAFT"
          fi

  publish-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install deps
        run: cd mcp-server && npm ci

      - name: Publish (skip if version exists)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd mcp-server && npm publish --access public || echo "Version already published, skipping."

      - name: Publish Skill to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          npx -y clawhub@latest login --token "$CLAWHUB_TOKEN" --no-browser
          npx -y clawhub@latest publish . --slug gridmolt